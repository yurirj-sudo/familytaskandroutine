<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Suppressing Navigation Shell as per "Linear/Transactional" logic (Login/Join flow) -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden bg-gradient-to-br from-surface via-surface-container-low to-surface-variant/30">
<!-- Background Decorative Elements -->
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-tertiary-container/10 rounded-full blur-3xl"></div>
<div class="w-full max-w-md z-10">
<!-- Header Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-20 h-20 mb-6 bg-surface-container-lowest rounded-xl custom-shadow relative group">
<span class="material-symbols-outlined text-4xl text-primary transition-transform group-hover:scale-110" data-icon="key">key</span>
<div class="absolute -top-2 -right-2 bg-tertiary-container text-on-tertiary-container rounded-full px-2 py-1 text-[10px] font-black uppercase tracking-tighter">New</div>
</div>
<h1 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight leading-tight mb-3">
                    Recebeu um convite?
                </h1>
<p class="text-on-surface-variant font-medium max-w-[280px] mx-auto leading-relaxed">
                    Sua jornada em família começa com uma simples chave mágica.
                </p>
</div>
<!-- Interaction Card -->
<div class="bg-surface-container-lowest/70 backdrop-blur-xl rounded-lg p-8 custom-shadow border border-white/40">
<div class="space-y-8">
<!-- Illustration / Visual Anchor -->
<div class="flex justify-center">
<div class="relative w-48 h-32 rounded-lg overflow-hidden bg-primary-container/20 group">
<img alt="Antique golden key on a soft glowing indigo surface" class="w-full h-full object-cover mix-blend-overlay opacity-60" data-alt="a majestic glowing golden key floating in the center of an ethereal indigo portal with soft light particles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPTsTCk7yAH9fVl0OHb5V_TOg4NprJWfI3PzOLaCjdJ376-pSe-4_b8Yp5Dt8sWrTlP20TcX0sh0tzJhwJ91rrMWVm_7lY5nUgwWw96xnpScZNFuLKcrtXA45L9WIWfkhKaUAAIOR9t5rV1B_10jRvfMAUWlcvq25Zy-NM7Eq4k6mF7gCq-71m8pxIRGAwBhAUbz7y5Ak27Ril1wLZi3AnvNq5XtWw5-FiwEvErvgbMQ6cK97lUucj9wPTo6SO9DOvzsUtD3bAdp4c"/>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-5xl text-primary/80" data-icon="auto_fix">auto_fix</span>
</div>
</div>
</div>
<!-- Input Section -->
<div class="space-y-4">
<label class="block text-center text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant opacity-60">
                            Digite o código de 6 dígitos
                        </label>
<div class="flex justify-between gap-2 md:gap-3">
<input class="w-full aspect-square text-center font-headline font-bold text-2xl border-none bg-surface-container-low rounded-md focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all text-primary uppercase" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl border-none bg-surface-container-low rounded-md focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all text-primary uppercase" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl border-none bg-surface-container-low rounded-md focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all text-primary uppercase" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl border-none bg-surface-container-low rounded-md focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all text-primary uppercase" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl border-none bg-surface-container-low rounded-md focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all text-primary uppercase" maxlength="1" placeholder="•" type="text"/>
<input class="w-full aspect-square text-center font-headline font-bold text-2xl border-none bg-surface-container-low rounded-md focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all text-primary uppercase" maxlength="1" placeholder="•" type="text"/>
</div>
</div>

<div class="space-y-4 pt-2">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-5 rounded-full shadow-lg shadow-primary/25 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                            Entrar no Time
                            <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center gap-3 p-4 bg-surface-container/50 rounded-md">
<span class="material-symbols-outlined text-primary text-xl" data-icon="info">info</span>
<p class="text-[13px] leading-snug font-medium text-on-surface-variant">
                                Peça o código para o admin da sua família
                            </p>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-8 text-center">
<button class="text-primary font-bold text-sm hover:underline underline-offset-4 flex items-center justify-center gap-2 mx-auto">
<span class="material-symbols-outlined text-lg" data-icon="add_home">add_home</span>
                    Criar minha própria família
                </button>
</div>
</div>
</main>
<!-- Support Link Footer (Minimalist for Transactional Flow) -->
<footer class="py-6 text-center text-on-surface-variant/40 text-[11px] font-medium tracking-widest uppercase">
        FamilyQuest © 2024 • Gamified Growth
    </footer>
